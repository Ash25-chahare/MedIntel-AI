<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedIntel AI - Chat</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="brand-header">🫀 MedIntel AI</div>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-item">Dashboard</a></li>
            <li><a href="medications.html" class="nav-item">Schedule</a></li>
            <li><a href="analytics.html" class="nav-item">Analytics</a></li>
            <li><a href="chatbot.html" class="nav-item active">Chat Assistant</a></li>
            <li><a href="profile.html" class="nav-item">Profile</a></li>
        </ul>
    </aside>

    <main class="main-wrapper">
        <div class="content-area">
            <h1 class="page-title">AI Chat Assistant</h1>
            
            <div class="grid-row">
                <div class="card col-2 chat-container">
                    <div class="chat-history">
                        <div class="chat-bubble bubble-user">What medicines should I take today?</div>
                        <div class="chat-bubble bubble-ai">
                            <strong>AI Response:</strong><br>
                            • Atorvastatin 20mg - 8:00 AM<br>
                            • Metformin 500mg - 8:00 PM
                        </div>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" class="form-control" placeholder="Type your message...">
                        <button class="btn-primary">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
